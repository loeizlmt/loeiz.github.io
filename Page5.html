<!DOCTYPE html>
<html>
    <head><title>page 5</title>
        <link rel="stylesheet" type="text/css" href="style.css"></head>
    <body >
    <div class="page5" style="background-color: #f5f5f5 ;">
        <div class="présentation-plan" >
        <h1 class="titre-pages">Voici la page 5</h1>
        <p class="paragraphe-pages">Vous êtes sur la page 5 vous pouvez générer une note sur 20 aléatoire</p>

        <script>
            var click = 0;
            function entierAleatoire()
            {
                entier = Math.floor(Math.random() * 21);
                alert("La note sur 20 est : " + entier);
            }      
            function buttonCliqué(){
                click = click + 1;
                if (click == 6){
                    alert("les notes générées doivent vraiment être basses pour cliquer autant de fois sur le bouton");
                    click = 0;
                }
            }
        </script>
        <button class="button-note" onclick="entierAleatoire() , buttonCliqué()" >générer</button>
        <img src="illustration-générateur-notes.webp" class="illustration-générateur-notes">
    </div>
</div>
    </body>
</html>
